name: CI

on:
  push:
    branches: ["main", "Prod"]
  pull_request:
    branches: ["main", "Prod"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  build-and-test:
    name: Build and Test (macOS)
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$XCODE" ] && sudo xcode-select -s "${XCODE}/Contents/Developer" || true
          xcode-select -p

      - name: Swift Version
        run: swift --version

      - name: Cache Swift PM Dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build Debug
        run: swift build

      - name: Run Tests
        run: swift test

      # package_dmg.sh already runs `swift build -c release` internally, so we
      # skip the redundant standalone release build step here.
      - name: Package App Bundle
        run: |
          ./scripts/package_dmg.sh
        env:
          APP_VERSION: "CI-${{ github.run_number }}"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: QuotaBar-CI-${{ github.sha }}
          path: |
            dist/QuotaBar-macOS.zip
            dist/QuotaBar.dmg
          retention-days: 7
