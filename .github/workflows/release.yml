name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - Prod
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # One job handles all three triggers (Prod push, manual tag push, workflow_dispatch)
  # in a single run. An earlier version of this split "compute + push a tag on Prod
  # push" into its own job and relied on that tag push triggering a *second* run via
  # the `tags: v*` event — but GitHub deliberately does not let the default
  # GITHUB_TOKEN's own pushes trigger further workflow runs (an anti-recursion
  # safeguard), so that second run never happened and nothing ever got built/published
  # for the auto-created tag. Doing the tagging and the build/publish in the same job
  # sidesteps that entirely — no second trigger is needed.
  release:
    name: Build & Publish Release
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history to compute the next auto-version

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$XCODE" ] && sudo xcode-select -s "${XCODE}/Contents/Developer" || true
          xcode-select -p

      - name: Cache Swift PM Dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Triggered by a push to Prod, not a tag — auto-bump the patch version
            # from the highest existing vX.Y.Z tag. The tag itself isn't created yet;
            # that happens later, only once CI is confirmed to have passed on this
            # commit (see "Create Release Tag" below).
            git fetch origin --tags --force
            LATEST=$(git tag -l 'v*' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
            if [ -z "$LATEST" ]; then LATEST="0.0.0"; fi
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Auto-bumping from latest tag v$LATEST -> v$VERSION"
            echo "NEEDS_TAG=true" >> "$GITHUB_ENV"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION. Must be X.Y.Z"
            exit 1
          fi
          echo "$VERSION" > VERSION
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify CI passed on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for $SHA..."
          # macOS runners can sit queued for 15-20+ min before a run even starts,
          # so this needs real headroom beyond the CI job's own runtime.
          for i in $(seq 1 80); do
            RUN=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
              --jq '[.check_runs[] | select(.name == "Build and Test (macOS)")] | first')
            if [ -z "$RUN" ] || [ "$RUN" = "null" ]; then
              echo "No 'Build and Test (macOS)' check run found yet for $SHA, waiting..."
            else
              STATUS=$(echo "$RUN" | jq -r '.status')
              CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')
              echo "status=$STATUS conclusion=$CONCLUSION"
              if [ "$STATUS" = "completed" ]; then
                if [ "$CONCLUSION" = "success" ]; then
                  echo "CI passed."
                  exit 0
                else
                  echo "::error::CI check 'Build and Test (macOS)' did not pass on $SHA (conclusion: $CONCLUSION). Aborting release."
                  exit 1
                fi
              fi
              echo "CI still running (status: $STATUS), waiting..."
            fi
            sleep 30
          done
          echo "::error::Timed out waiting for 'Build and Test (macOS)' check run to complete on $SHA. Aborting release."
          exit 1

      # Only for the Prod-push (auto-bump) path, and only after CI is confirmed green
      # on this exact commit — so an auto-created tag always points at a verified-good
      # commit, never a broken one.
      - name: Create Release Tag
        if: env.NEEDS_TAG == 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Build & Test
        run: |
          swift build
          swift test

      - name: Check For Signing Secrets
        run: |
          if [ -n "${MACOS_CERTIFICATE_P12:-}" ]; then
            echo "HAS_SIGNING_CERT=true" >> "$GITHUB_ENV"
          else
            echo "HAS_SIGNING_CERT=false" >> "$GITHUB_ENV"
            echo "::notice::MACOS_CERTIFICATE_P12 secret not set — packaging ad-hoc signed, unnotarized (see docs/RELEASE_CHECKLIST.md to enable Developer ID + notarization)."
          fi
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}

      # Imports the Developer ID Application certificate into a throwaway keychain
      # scoped to this job — the GitHub-hosted runner is destroyed after the job, so
      # there's nothing to clean up beyond the keychain entry itself (handled below).
      - name: Import Code-Signing Certificate
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/certificate.p12"

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)"/\1/')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported certificate."
            exit 1
          fi
          echo "DEVELOPER_ID_APPLICATION=$IDENTITY" >> "$GITHUB_ENV"

      - name: Set Up Notarization Credentials
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "quotabar-notarytool" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --keychain "$RUNNER_TEMP/signing.keychain-db"
          echo "NOTARYTOOL_PROFILE=quotabar-notarytool" >> "$GITHUB_ENV"
          echo "NOTARIZE_DMG=1" >> "$GITHUB_ENV"

      - name: Package DMG + ZIP
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/package_dmg.sh

      - name: Clean Up Signing Keychain
        if: always() && env.HAS_SIGNING_CERT == 'true'
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

      - name: Generate latest.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OWNER_REPO: ${{ github.repository }}
        run: python3 scripts/make_latest_json.py

      - name: Validate latest.json
        run: python3 scripts/validate_latest_json.py dist/latest.json "${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          echo "Publishing release $VERSION..."
          gh release create "$VERSION" \
            dist/QuotaBar.dmg \
            dist/QuotaBar-macOS.zip \
            dist/latest.json \
            --title "$VERSION" \
            --generate-notes || \
          gh release upload "$VERSION" \
            dist/QuotaBar.dmg \
            dist/QuotaBar-macOS.zip \
            dist/latest.json \
            --clobber

      - name: Post-Publish Verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER_REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: python3 scripts/check_published_latest.py
